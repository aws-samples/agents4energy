# Auto-generated by scripts/setup-github-integration.ts
name: Agent @mention handler

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, assigned]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  invoke-agent:
    runs-on: ubuntu-latest
    # Only run when @agent is mentioned and the sender is not a bot
    if: |
      github.event.sender.type != 'Bot' && (
        (github.event_name == 'issues' && github.event.action == 'assigned') ||
        (github.event_name == 'issues' && github.event.action == 'opened' && contains(github.event.issue.body, '@agent')) ||
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@agent'))
      )

    steps:
      - name: Acknowledge trigger
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # React to the triggering comment with 👀 so the user knows immediately
          if [ -n "${{ github.event.comment.id }}" ]; then
            curl -s -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
              -d '{"content":"eyes"}'
          fi
          # Post a status comment so the user knows the agent is starting
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/comments" \
            -d '{"body":"⚙️ Agent triggered — creating chat session…"}' \
            | jq -r '.id' > /tmp/status_comment_id.txt
          echo "Status comment ID: $(cat /tmp/status_comment_id.txt)"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_AGENT_ROLE_ARN }}
          aws-region: us-east-1

      - name: Invoke agent and post reply
        env:
          APPSYNC_ENDPOINT: ${{ vars.APPSYNC_ENDPOINT }}
          APP_URL: ${{ vars.APP_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY=$(cat <<'ISSUE_BODY_EOF'
          ${{ github.event.issue.body }}
          ISSUE_BODY_EOF
          )
          COMMENT_BODY=$(cat <<'COMMENT_BODY_EOF'
          ${{ github.event.comment.body }}
          COMMENT_BODY_EOF
          )
          SENDER="${{ github.event.sender.login }}"
          REPO="${{ github.repository }}"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          STATUS_COMMENT_ID=$(cat /tmp/status_comment_id.txt 2>/dev/null || echo "")

          # Extract agent slug from @agent or @agent-<slug> mention
          RAW_TEXT="${COMMENT_BODY:-$ISSUE_BODY}"
          AGENT_SLUG=$(echo "$RAW_TEXT" | grep -oP '@agent-\K[\w-]+' | head -1)
          AGENT_SLUG="${AGENT_SLUG:-default}"

          # Strip the @agent mention to get the user's actual request
          USER_PROMPT=$(echo "$RAW_TEXT" | sed 's/@agent-[[:alnum:]_-]*//g; s/@agent//g' | xargs)
          USER_PROMPT="${USER_PROMPT:-$ISSUE_TITLE}"

          PROMPT="You are acting on behalf of a GitHub user in the repository ${REPO}.

          CONTEXT:
          - Repository: ${REPO}
          - Default branch: ${DEFAULT_BRANCH}
          - Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}
          - Issue body: $(echo "$ISSUE_BODY" | head -c 500)
          - Triggered by: @${SENDER}

          USER REQUEST:
          ${USER_PROMPT}

          If your response involves code changes, create a new branch off ${DEFAULT_BRANCH}, commit the changes, and open a pull request. Reference issue #${ISSUE_NUMBER} in the PR description."

          # Create a ChatSession so the run is viewable in the web UI
          SESSION_ID=$(uuidgen | tr '[:upper:]' '[:lower:]')
          SESSION_NAME="GitHub #${ISSUE_NUMBER} — ${ISSUE_TITLE}"
          CREATE_SESSION_BODY=$(jq -n \
            --arg name "$SESSION_NAME" \
            '{"query":"mutation CreateChatSession($input: CreateChatSessionInput!) { createChatSession(input: $input) { id } }","variables":{"input":{"name":$name}}}')

          SESSION_RESP=$(curl -s -X POST "$APPSYNC_ENDPOINT" \
            -H "Content-Type: application/json" \
            -H "X-Amz-Security-Token: $AWS_SESSION_TOKEN" \
            --user "$AWS_ACCESS_KEY_ID:$AWS_SECRET_ACCESS_KEY" \
            --aws-sigv4 "aws:amz:us-east-1:appsync" \
            -d "$CREATE_SESSION_BODY")
          CREATED_ID=$(echo "$SESSION_RESP" | jq -r '.data.createChatSession.id // empty')
          if [ -n "$CREATED_ID" ]; then
            SESSION_ID="$CREATED_ID"
            echo "Chat session created: $SESSION_ID"
          else
            echo "Warning: could not create chat session: $SESSION_RESP"
          fi

          # Update the status comment with a live-chat link
          if [ -n "$APP_URL" ] && [ -n "$STATUS_COMMENT_ID" ]; then
            LIVE_BODY="🤖 Agent is working… [Watch live](${APP_URL}/chat-handler?sessionId=${SESSION_ID})"
            curl -s -X PATCH \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/issues/comments/${STATUS_COMMENT_ID}" \
              -d "$(jq -n --arg b "$LIVE_BODY" '{"body":$b}')"
          fi

          # Invoke the agent via AppSync (Lambda handles harness auth)
          INVOKE_BODY=$(jq -n \
            --arg slug "$AGENT_SLUG" \
            --arg prompt "$PROMPT" \
            --arg sessionId "$SESSION_ID" \
            '{"query":"mutation InvokeAgent($agentSlug: String!, $prompt: String!, $sessionId: String) { invokeAgent(agentSlug: $agentSlug, prompt: $prompt, sessionId: $sessionId) { response sessionId } }","variables":{"agentSlug":$slug,"prompt":$prompt,"sessionId":$sessionId}}')

          INVOKE_RESP=$(curl -s -X POST "$APPSYNC_ENDPOINT" \
            -H "Content-Type: application/json" \
            -H "X-Amz-Security-Token: $AWS_SESSION_TOKEN" \
            --user "$AWS_ACCESS_KEY_ID:$AWS_SECRET_ACCESS_KEY" \
            --aws-sigv4 "aws:amz:us-east-1:appsync" \
            -d "$INVOKE_BODY")

          AGENT_RESPONSE=$(echo "$INVOKE_RESP" | jq -r '.data.invokeAgent.response // empty')
          if [ -z "$AGENT_RESPONSE" ]; then
            ERRORS=$(echo "$INVOKE_RESP" | jq -r '.errors // empty')
            AGENT_RESPONSE="⚠️ Agent returned no response. Errors: ${ERRORS:-none}"
          fi

          echo "Agent response length: ${#AGENT_RESPONSE}"

          # Post the agent's reply as a GitHub comment
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}/comments" \
            -d "$(jq -n --arg b "$AGENT_RESPONSE" '{"body":$b}')"
