# Auto-generated by scripts/setup-github-integration.ts
name: Agent @mention handler

on:
  issue_comment:
    types: [created]
  issues:
    types: [assigned]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  invoke-agent:
    runs-on: ubuntu-latest
    # Only run when a comment contains @agent or @agent-<slug> and was not written by a bot
    if: |
      github.event.sender.type != 'Bot' && (
        github.event_name == 'issues' ||
        contains(github.event.comment.body, '@agent')
      )

    steps:
      - name: Acknowledge trigger
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # React to the triggering comment with 👀 so the user knows immediately
          if [ -n "${{ github.event.comment.id }}" ]; then
            curl -s -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
              -d '{"content":"eyes"}'
          fi
          # Post a status comment so the user knows the agent is starting
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/comments" \
            -d '{"body":"⚙️ Agent triggered — creating chat session…"}' \
            | jq -r '.id' > /tmp/status_comment_id.txt
          echo "Status comment ID: $(cat /tmp/status_comment_id.txt)"

      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install script dependencies
        working-directory: scripts
        run: pnpm install --frozen-lockfile

      - name: Invoke agent and post reply
        env:
          INVOKE_AGENT_RUNTIME_ARN: ${{ vars.INVOKE_AGENT_RUNTIME_ARN }}
          APPSYNC_ENDPOINT: ${{ vars.APPSYNC_ENDPOINT }}
          APP_URL: ${{ vars.APP_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_BASE_REF: ${{ github.event.repository.default_branch }}
          STATUS_COMMENT_ID_FILE: /tmp/status_comment_id.txt
        working-directory: scripts
        run: pnpm exec tsx github-agent-invoke.ts
