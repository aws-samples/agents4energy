name: Claude Code Action

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write   # required for OIDC → AWS credentials
  actions: write    # required for Claude to trigger and monitor the deploy workflow

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

env:
  AWS_REGION: us-east-1

jobs:
  claude:
    if: |
      github.actor == github.repository_owner && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: anthropics/claude-code-action@v1
        env:
          # Needed for ampx pipeline-deploy and gh CLI commands Claude runs in bash
          GH_TOKEN: ${{ github.token }}
        with:
          github_token: ${{ github.token }}
          use_bedrock: "true"
          claude_args: "--model us.anthropic.claude-sonnet-4-6"
