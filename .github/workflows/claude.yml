name: Claude Code Action

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write   # required for OIDC → AWS credentials
  actions: write    # required for Claude to trigger and monitor the deploy workflow

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]

env:
  AWS_REGION: us-east-1

jobs:
  claude:
    concurrency:
      group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: true
    if: |
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        github.event.issue.author_association == 'OWNER' ||
        github.event.issue.author_association == 'MEMBER' ||
        github.event.issue.author_association == 'COLLABORATOR' ||
        github.actor == 'waltmayf'
      ) && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Mark in-progress
        env:
          GH_TOKEN: ${{ github.token }}
          # Pass event context through env vars, not shell interpolation, so an
          # attacker-controlled value can't inject commands (ACAT ScriptInjection).
          ISSUE: ${{ github.event.issue.number || github.event.pull_request.number }}
        run: |
          gh label create "agent-working" --repo "$GITHUB_REPOSITORY" --color "e4e669" --description "Claude is actively working on this" 2>/dev/null || true
          gh issue edit "$ISSUE" --repo "$GITHUB_REPOSITORY" --add-label "agent-working" 2>/dev/null || true

      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 21600

      - uses: anthropics/claude-code-action@v1
        timeout-minutes: 300
        env:
          # Needed for ampx pipeline-deploy and gh CLI commands Claude runs in bash
          GH_TOKEN: ${{ github.token }}
        with:
          github_token: ${{ github.token }}
          use_bedrock: "true"
          claude_args: >-
            --model us.anthropic.claude-sonnet-5
            --allowedTools "Bash(act *),
            Bash(cd *),
            Bash(ls *),
            Bash(cat *),
            Bash(curl *),
            Bash(npx ampx *),
            Bash(node scripts/*),
            Bash(bash scripts/*),
            Bash(pnpm *),
            Bash(docker *),
            Bash(aws * get-*),
            Bash(aws * list-*),
            Bash(aws * describe-*),
            Bash(openssl *),
            Bash(gh *),
            Bash(npx *),
            Bash(tsc *)
            "

      - name: Upload execution log to CloudWatch
        if: always()
        uses: ./.github/actions/upload-execution-log
        with:
          aws-region: ${{ env.AWS_REGION }}

      - name: Remove agent-working label
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ github.event.issue.number || github.event.pull_request.number }}
        run: |
          gh issue edit "$ISSUE" --repo "$GITHUB_REPOSITORY" --remove-label "agent-working" 2>/dev/null || true