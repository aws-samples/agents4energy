name: Claude Code Action

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write   # required for OIDC → AWS credentials
  actions: write    # required for Claude to trigger and monitor the deploy workflow

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

env:
  AWS_REGION: us-east-1

jobs:
  claude:
    concurrency:
      group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: true
    if: |
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        github.event.issue.author_association == 'OWNER' ||
        github.event.issue.author_association == 'MEMBER' ||
        github.event.issue.author_association == 'COLLABORATOR' ||
        github.actor == 'waltmayf'
      ) && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Mark in-progress
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE=${{ github.event.issue.number || github.event.pull_request.number }}
          gh label create "agent-working" --repo "$GITHUB_REPOSITORY" --color "e4e669" --description "Claude is actively working on this" 2>/dev/null || true
          gh issue edit "$ISSUE" --repo "$GITHUB_REPOSITORY" --add-label "agent-working" 2>/dev/null || true

      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 21600

      - uses: anthropics/claude-code-action@v1
        timeout-minutes: 300
        env:
          # Needed for ampx pipeline-deploy and gh CLI commands Claude runs in bash
          GH_TOKEN: ${{ github.token }}
        with:
          github_token: ${{ github.token }}
          use_bedrock: "true"
          claude_args: >-
            --model us.anthropic.claude-sonnet-5
            --allowedTools "Bash(act *),
            Bash(cd *),
            Bash(ls *),
            Bash(cat *),
            Bash(curl *),
            Bash(npx ampx *),
            Bash(node scripts/*),
            Bash(bash scripts/*),
            Bash(pnpm *),
            Bash(docker *),
            Bash(aws * get-*),
            Bash(aws * list-*),
            Bash(aws * describe-*),
            Bash(openssl *),
            Bash(gh *)
            "

      - name: Upload execution log to CloudWatch
        if: always()
        run: |
          python3 - <<'EOF'
          import json, os, subprocess, time, sys, tempfile

          LOG_GROUP = "/github-actions/claude-code"
          repo = os.environ.get("GITHUB_REPOSITORY", "unknown").replace("/", "-")
          run_id = os.environ.get("GITHUB_RUN_ID", "0")
          LOG_STREAM = f"{repo}/{run_id}"
          region = os.environ.get("AWS_REGION", "us-east-1")

          def aws(*args):
              return subprocess.run(["aws", "--region", region] + list(args),
                                    capture_output=True, text=True)

          def put_log_events(batch):
              # Pass the batch via a temp file (file://) rather than inline on the
              # command line — a large --log-events value overflows the OS argument
              # limit (Errno 7: Argument list too long).
              with tempfile.NamedTemporaryFile("w", suffix=".json", delete=False) as tf:
                  json.dump(batch, tf)
                  path = tf.name
              try:
                  return aws("logs", "put-log-events", "--log-group-name", LOG_GROUP,
                             "--log-stream-name", LOG_STREAM,
                             "--log-events", f"file://{path}")
              finally:
                  os.unlink(path)

          aws("logs", "create-log-group", "--log-group-name", LOG_GROUP)
          aws("logs", "put-retention-policy", "--log-group-name", LOG_GROUP,
              "--retention-in-days", "30")
          aws("logs", "create-log-stream", "--log-group-name", LOG_GROUP,
              "--log-stream-name", LOG_STREAM)

          log_file = "/home/runner/work/_temp/claude-execution-output.json"
          if not os.path.exists(log_file):
              print("No execution log found")
              sys.exit(0)

          with open(log_file) as f:
              lines = [l for l in f.read().splitlines() if l.strip()]

          MAX_BATCH_BYTES = 900_000
          MAX_EVENT_BYTES = 250_000

          events = []
          ts = int(time.time() * 1000)
          for i, line in enumerate(lines):
              events.append({"timestamp": ts + i, "message": line[:MAX_EVENT_BYTES]})

          batch, batch_size = [], 0
          for event in events:
              size = len(event["message"].encode()) + 26
              if batch and (batch_size + size > MAX_BATCH_BYTES or len(batch) >= 10000):
                  r = put_log_events(batch)
                  if r.returncode != 0:
                      print(f"Warning: {r.stderr}", file=sys.stderr)
                  batch, batch_size = [], 0
              batch.append(event)
              batch_size += size

          if batch:
              r = put_log_events(batch)
              if r.returncode != 0:
                  print(f"Warning: {r.stderr}", file=sys.stderr)

          print(f"Uploaded {len(events)} events to {LOG_GROUP}/{LOG_STREAM}")
          EOF

      - name: Remove agent-working label
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE=${{ github.event.issue.number || github.event.pull_request.number }}
          gh issue edit "$ISSUE" --repo "$GITHUB_REPOSITORY" --remove-label "agent-working" 2>/dev/null || true
